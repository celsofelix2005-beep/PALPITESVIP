<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palpites MZ - IA</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#0f172a;color:#e5e7eb}
header{background:#0b1220;padding:16px;text-align:center;position:sticky;top:0;z-index:10}
h1{margin:0;color:#22c55e;font-size:22px}
.tabs{display:flex;background:#0b1220;position:sticky;top:60px;z-index:10}
.tab{flex:1;padding:12px;border:none;background:#1e293b;color:#94a3b8;font-weight:bold;cursor:pointer}
.tab.active{background:#22c55e;color:#0f172a}
.content{padding:16px;display:none;max-width:600px;margin:0 auto}
.content.active{display:block}
.jogo{background:#1e293b;margin:10px 0;padding:12px;border-radius:8px;border-left:3px solid #22c55e}
.bilhete{background:#1e293b;margin:16px 0;padding:12px;border-radius:8px;border:2px solid #22c55e}
.bilhete-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.bilhete-titulo{color:#22c55e;font-weight:bold}
.bilhete-tag{background:#22c55e;color:#0f172a;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:bold}
.liga{font-size:12px;color:#94a3b8}
.times{font-size:16px;margin:4px 0}
.palpite{color:#22c55e;font-weight:bold}
.odd{float:right;background:#0f172a;padding:2px 6px;border-radius:4px;font-size:12px}
.update{font-size:11px;color:#64748b;text-align:center;margin:20px 0}
.btn{position:fixed;bottom:20px;right:20px;background:#22c55e;color:#0f172a;padding:14px 20px;border-radius:50px;font-weight:bold;text-decoration:none;box-shadow:0 4px 12px rgba(34,197,94,0.4);z-index:20}
.vazio{text-align:center;color:#64748b;padding:40px 0}
.lock{text-align:center;padding:40px 20px;background:#1e293b;border-radius:12px;border:2px dashed #f59e0b;margin-top:20px}
.lock-icon{font-size:48px;margin-bottom:12px}
.lock-titulo{font-size:18px;color:#f59e0b;font-weight:bold;margin-bottom:8px}
.lock-texto{color:#94a3b8;margin-bottom:16px;line-height:1.5}
.btn-vip{display:inline-block;background:#22c55e;color:#0f172a;padding:12px 24px;border-radius:8px;font-weight:bold;text-decoration:none}
</style>
</head>
<body>
<header><h1>Palpites MZ IA</h1></header>
<div class="tabs">
  <button class="tab active" onclick="trocaAba('gratis')">Grátis</button>
  <button class="tab" onclick="trocaAba('diario')">VIP Diário</button>
  <button class="tab" onclick="trocaAba('semanal')">VIP Semanal</button>
</div>

<div id="gratis" class="content active"></div>
<div id="diario" class="content"></div>
<div id="semanal" class="content"></div>

<div class="update">Última atualização: <span id="dataUpdate">--/--/---- --:--</span></div>
<a href="https://wa.me/258860676062?text=Quero%20ser%20VIP" class="btn">WhatsApp VIP</a>

<script>
function trocaAba(aba){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(aba).classList.add('active');
}

// DADOS INJETADOS PELO ROBÔ - NÃO APAGAR ESSA LINHA
const DADOS = {GRATIS:[],DIARIO:[],SEMANAL:[],UPDATE:""};
const VIP_LIBERADO = false;

function cardBilhete(tipo, jogos){
  if(!jogos.length) return '<p class="vazio">Bilhete em análise</p>';
  const totalOdd = jogos.reduce((t,j)=> t * parseFloat(j.odd), 1).toFixed(2);
  const selo = tipo=='DIARIO'? `Odd Total ${totalOdd}` : `Odd Total ${totalOdd}+`;
  const titulo = tipo=='DIARIO'?'VIP Diário - 2 Jogos': 'VIP Semanal - 3 Jogos';
  return `
    <div class="bilhete">
      <div class="bilhete-top">
        <span class="bilhete-titulo">${titulo}</span>
        <span class="bilhete-tag">${selo}</span>
      </div>
      ${jogos.map(j=>`
        <div class="jogo" style="border:none;border-bottom:1px solid #0f172a;margin:6px 0;border-radius:0">
          <div class="liga">${j.liga} - ${j.hora}</div>
          <div class="times">${j.casa} x ${j.fora} <span class="odd">${j.odd}</span></div>
          <div class="palpite">Palpite: ${j.palpite}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function telaBloqueio(tipo){
  const preco = tipo=='diario'? '100 MT/dia' : '500 MT/semana';
  const nome = tipo=='diario'? 'VIP Diário' : 'VIP Semanal';
  return `
    <div class="lock">
      <div class="lock-icon">🔒</div>
      <div class="lock-titulo">${nome} Bloqueado</div>
      <div class="lock-texto">Faz o pagamento de ${preco} via M-Pesa para liberar os palpites com odds altas.</div>
      <a href="https://wa.me/258860676062?text=Quero%20pagar%20o%20${nome}%20${preco}" class="btn-vip">Pagar via WhatsApp</a>
    </div>
  `;
}

function montaJogos(){
  document.getElementById('gratis').innerHTML = DADOS.GRATIS.map(j=>`
    <div class="jogo">
      <div class="liga">${j.liga} - ${j.hora}</div>
      <div class="times">${j.casa} x ${j.fora} <span class="odd">${j.odd}</span></div>
      <div class="palpite">Palpite: ${j.palpite}</div>
    </div>
  `).join('') || '<p class="vazio">Sem jogos grátis hoje</p>';

  document.getElementById('diario').innerHTML = VIP_LIBERADO? cardBilhete('DIARIO', DADOS.DIARIO) : telaBloqueio('diario');
  document.getElementById('semanal').innerHTML = VIP_LIBERADO? cardBilhete('SEMANAL', DADOS.SEMANAL) : telaBloqueio('semanal');

  document.getElementById('dataUpdate').innerText = DADOS.UPDATE || '--/--/---- --:--';
}
montaJogos();
</script>
</body>
  </html>
